{% load static %}
<form id="ajouterClientForm" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="row g-3">
    {% for field in form %}
      <div class="col-md-6">
        <label class="form-label" for="id_{{ field.name }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
          <div class="form-text">{{ field.help_text }}</div>
        {% endif %}
        {% for error in field.errors %}
          <div class="text-danger small">{{ error }}</div>
        {% endfor %}
      </div>
    {% endfor %}
  </div>
  <div class="d-flex justify-content-end mt-4">
    <button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Annuler</button>
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-user-plus me-2"></i>Ajouter
    </button>
  </div>
</form>
