<!-- Reservation Modal -->
<div class="modal fade" id="reservationModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-calendar-plus me-2"></i>
          Réserver <span id="equipmentName"></span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="reservationForm">
          <div class="row">
            <div class="col-md-6">
              <label class="form-label">Date de début</label>
              <input type="date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date de fin</label>
              <input type="date" class="form-control" required>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-6">
              <label class="form-label">Heure de récupération</label>
              <input type="time" class="form-control" value="08:00" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Lieu de livraison</label>
              <select class="form-select" required>
                <option value="">Choisir...</option>
                <option value="depot">Retrait au dépôt</option>
                <option value="livraison">Livraison sur site</option>
              </select>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">Adresse de livraison (si applicable)</label>
            <textarea class="form-control" rows="2" placeholder="Adresse complète..."></textarea>
          </div>
          <div class="mt-3">
            <label class="form-label">Commentaires</label>
            <textarea class="form-control" rows="3" placeholder="Informations complémentaires..."></textarea>
          </div>
          <div class="pricing-summary mt-4 p-3 bg-light rounded">
            <div class="pricing-summary">
              <div class="d-flex justify-content-between">
                <span>Prix journalier:</span>
                <span id="daily-price">78 000 F CFA</span>
              </div>
              <div class="d-flex justify-content-between">
                <span>Nombre de jours:</span>
                <span id="total-days">1</span>
              </div>
              <div class="d-flex justify-content-between">
                <span>Livraison:</span>
                <span id="delivery-cost">Gratuite</span>
              </div>
              <hr>
              <div class="d-flex justify-content-between fw-bold">
                <span>Total:</span>
                <span id="total-price">78 000 F CFA</span>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="submit" form="reservationForm" class="btn btn-primary">
          <i class="fas fa-check me-2"></i>Confirmer la réservation
        </button>
      </div>
    </div>
  </div>
</div>
