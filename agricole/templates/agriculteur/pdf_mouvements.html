<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: DejaVu Sans, sans-serif;
            font-size: 12px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h2 {
            margin: 0;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 8px;
            border: 1px solid #333;
        }
        .table th {
            background-color: #eee;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Récapitulatif des Mouvements Financiers</h2>
        <p>{{ mouvements.0.utilisateur.nom|default:"Utilisateur" }}</p>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Montant (FCFA)</th>
            </tr>
        </thead>
        <tbody>
            {% for m in mouvements %}
            <tr>
                <td>{{ m.date|date:"d/m/Y" }}</td>
                <td>{{ m.description }}</td>
                <td>{{ m.get_type_display }}</td>
                <td>{{ m.montant }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
