{% load static %} <!-- Chargement de la bibliothèque de fichiers statiques Django -->

<!DOCTYPE html> <!-- Déclaration du type de document pour spécifier qu'il s'agit d'un document HTML5 -->
<html> <!-- Début du document HTML -->

<head> <!-- Début de la section <head> pour définir les métadonnées, liens et ressources du document -->
    <meta charset="utf-8"> <!-- Définition du jeu de caractères en UTF-8, important pour la gestion des caractères spéciaux -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- Optimisation de l'affichage pour Internet Explorer -->
    <title>FAMA</title> <!-- Titre de la page qui apparaîtra dans l'onglet du navigateur -->
    
    <!-- Déclaration de la balise viewport pour la gestion de l'adaptation à différents types d'écran (responsive) -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ajout de thème clair/sombre si tu as une bascule -->
    <meta name="color-scheme" content="light dark">

    <!-- Chargement des styles CSS depuis des fichiers externes et internes -->
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="{% static 'fontawesome-free/css/all.min.css' %}">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Liens vers d'autres bibliothèques CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css"> <!-- Pour les icônes Ionicons -->
    <link rel="stylesheet" href="{% static 'tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css' %}"> <!-- Pour le calendrier Tempusdominus -->
    <link rel="stylesheet" href="{% static 'icheck-bootstrap/icheck-bootstrap.min.css' %}"> <!-- Pour les cases à cocher -->
    <link rel="stylesheet" href="{% static 'jqvmap/jqvmap.min.css' %}"> <!-- Pour la cartographie JQVMap -->
    <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}"> <!-- Pour les styles du tableau de bord AdminLTE -->
    <link rel="stylesheet" href="{% static 'overlayScrollbars/css/OverlayScrollbars.min.css' %}"> <!-- Pour ajouter un effet de défilement personnalisable -->
    <link rel="stylesheet" href="{% static 'daterangepicker/daterangepicker.css' %}"> <!-- Pour la sélection de dates -->
    <link rel="stylesheet" href="{% static 'summernote/summernote-bs4.css' %}"> <!-- Pour l'éditeur de texte Summernote -->
    
    <!-- Police Google "Source Sans Pro" utilisée pour le texte -->
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
</head>
{% block extra_js %}{% endblock %}

<style>
    .card {
    border-radius: 10px;
    transition: transform 0.2s;
}
.card:hover {
    transform: scale(1.02);
}

</style>
<!-- Corps de la page HTML où le contenu dynamique sera chargé -->
<body>
    {% block content %} <!-- Blocs de contenu dynamiques qui peuvent être remplis par d'autres pages héritant de ce modèle -->
    {% endblock content %} <!-- Fin du bloc de contenu -->
    
    <!-- Scripts JavaScript nécessaires au bon fonctionnement de la page -->
    
    <!-- Chargement de jQuery (version 3.4.1) -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    
    <!-- Chargement de Popper.js (utilisé par Bootstrap pour les popups, tooltips) -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    
    <!-- Chargement de Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <!-- Chargement de la version jQuery locale -->
    <script src="{% static 'jquery/jquery.min.js' %}"></script>
    
    <!-- Chargement de la bibliothèque jQuery UI pour les composants interactifs -->
    <script src="{% static 'jquery-ui/jquery-ui.min.js' %}"></script>

    <!-- Résolution de conflit entre les tooltips jQuery UI et ceux de Bootstrap -->
    <script> 
        $.widget.bridge('uibutton', $.ui.button) 
    </script>

    <!-- Chargement de Bootstrap 4 Bundle JS -->
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    
    <!-- Chargement de Chart.js pour afficher des graphiques -->
    <script src="{% static 'chart.js/Chart.min.js' %}"></script>
    
    <!-- Chargement de la bibliothèque Sparkline pour des graphiques en ligne -->
    <script src="{% static 'sparklines/sparkline.js' %}"></script>
    
    <!-- Chargement de JQVMap pour les cartes interactives -->
    <script src="{% static 'jqvmap/jquery.vmap.min.js' %}"></script>
    <script src="{% static 'jqvmap/maps/jquery.vmap.usa.js' %}"></script>

    <!-- Chargement de la bibliothèque pour les graphiques à cadran -->
    <script src="{% static 'jquery-knob/jquery.knob.min.js' %}"></script>

    <!-- Chargement de Moment.js pour la gestion des dates -->
    <script src="{% static 'moment/moment.min.js' %}"></script>

    <!-- Chargement de la fonctionnalité de sélection de plage de dates (daterangepicker) -->
    <script src="{% static 'daterangepicker/daterangepicker.js' %}"></script>

    <!-- Chargement de la bibliothèque Tempusdominus Bootstrap 4 pour le contrôle de date/heure -->
    <script src="{% static 'tempusdominus-bootstrap-4/js/tempusdominus-bootstrap-4.min.js' %}"></script>

    <!-- Chargement de Summernote pour l'éditeur de texte riche -->
    <script src="{% static 'summernote/summernote-bs4.min.js' %}"></script>

    <!-- Chargement de la bibliothèque OverlayScrollbars(OverlayScrollbars est une bibliothèque JavaScript qui permet de personnaliser les barres de défilement (scrollbars) dans une interface web.) pour des barres de défilement personnalisées -->
    <script src="{% static 'overlayScrollbars/js/jquery.overlayScrollbars.min.js' %}"></script>

    <!-- Chargement du script principal AdminLTE pour gérer l'interface utilisateur -->
    <script src="{% static 'dist/js/adminlte.js' %}"></script>
    
    <!-- Script de démonstration pour le tableau de bord -->
    <script src="{% static 'dist/js/pages/dashboard.js' %}"></script>
    
    <!-- Script de démonstration AdminLTE pour des exemples de fonctionnement -->
    <script src="{% static 'dist/js/demo.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
