{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h3>Passer une commande</h3>

  <form id="commande-form" method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label>Client</label>
      <select name="client" id="client-select" class="form-select" required>
        <option value="">-- sélectionner --</option>
        {% for c in clients %}
          <option value="{{ c.id }}" {% if client_obj and client_obj.id == c.id %}selected{% endif %}>{{ c.get_full_name }}</option>
        {% endfor %}
      </select>
    </div>

    <h5>Produits</h5>
    <div id="lignes">
      <div class="ligne row g-2 mb-2">
        <div class="col-md-5">
          <select class="form-select produit" name="produits[]">
            <option value="">-- choisir produit --</option>
            {% for p in produits %}
              <option value="{{ p.id }}" data-stock="{{ p.quantite }}" data-prix="{{ p.prix_unitaire }}">{{ p.nom_produit }} (Stock: {{ p.quantite }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <input type="number" name="quantite[]" min="1" class="form-control quantite" placeholder="Quantité">
        </div>
        <div class="col-md-2">
          <button type="button" class="btn btn-danger remove-line">Suppr</button>
        </div>
      </div>
    </div>

    <button type="button" id="add-line" class="btn btn-outline-secondary mb-3">Ajouter produit</button>
    <div>
      <button type="submit" class="btn btn-primary">Envoyer commande</button>
    </div>
  </form>

  <div id="feedback" class="mt-3"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const lignesContainer = document.getElementById('lignes');
  document.getElementById('add-line').addEventListener('click', function(){
    const first = lignesContainer.querySelector('.ligne');
    const clone = first.cloneNode(true);
    clone.querySelectorAll('select, input').forEach(el => el.value = '');
    lignesContainer.appendChild(clone);
  });

  lignesContainer.addEventListener('click', function(e){
    if (e.target.classList.contains('remove-line')) {
      const line = e.target.closest('.ligne');
      if (lignesContainer.querySelectorAll('.ligne').length > 1) line.remove();
    }
  });

  // Submit via AJAX
  document.getElementById('commande-form').addEventListener('submit', function(e){
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    fetch("{% url 'passer_commande' %}", {
      method: 'POST',
      headers: {'X-Requested-With': 'XMLHttpRequest'},
      body: fd
    }).then(r => r.json()).then(data => {
      const fb = document.getElementById('feedback');
      if (data.success) {
        fb.innerHTML = '<div class="alert alert-success">Commande créée.</div>';
        window.location.href = data.redirect_url;
      } else {
        fb.innerHTML = '<div class="alert alert-danger">'+(data.error||'Erreur')+'</div>';
      }
    });
  });
});
</script>
{% endblock %}
