{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bienvenue sur notre plateforme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background: url("{% static 'images/bg-farm.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            color: white;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .landing-content {
            position: relative;
            z-index: 2;
            padding-top: 20%;
        }

        .btn-custom {
            padding: 12px 30px;
            font-size: 1.2rem;
            margin: 10px;
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container text-center landing-content">
    <h1 class="display-4 fw-bold">Bienvenue sur notre plateforme agricole</h1>
    <p class="lead">Gérez vos clients, agriculteurs, commandes et plus encore depuis un seul tableau de bord.</p>

    {% if user.is_authenticated %}
        <a href="{% url 'admin_home' %}" class="btn btn-success btn-custom">Accéder au Dashboard</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-custom">Se connecter</a>
    {% endif %}
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
