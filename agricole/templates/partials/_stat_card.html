<!-- templates/partials/_stat_card.html -->
<div class="col-xxl-3 col-lg-4 col-md-6 col-sm-12 mb-4">
    <div class="card text-white bg-{{ color }} shadow">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h3 class="card-title">{{ value }}</h3>
                <p class="card-text">{{ title }}</p>
            </div>
            <i class="fas fa-{{ icon }} fa-3x"></i>
        </div>
        <div class="card-footer text-center bg-dark">
            <a href="{% url url %}" class="text-white text-decoration-none">
                Plus d'infos <i class="fas fa-arrow-circle-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
